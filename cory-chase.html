<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cory Chase · Videos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --red:#e50914;
      --tg:#229ED9;
      --bg:#0a0a0a;
      --card:#141414;
      --card-hover:#1c1c1c;
      --border:rgba(255,255,255,0.06);
      --text:#fff;
      --muted:rgba(255,255,255,0.45);
    }
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;}

    /* ── TOPBAR ── */
    .topbar{position:fixed;top:0;left:0;right:0;height:56px;z-index:100;
      background:linear-gradient(to bottom,rgba(10,10,10,0.96) 70%,transparent);
      display:flex;align-items:center;justify-content:space-between;padding:0 36px;}
    .topbar-logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;color:var(--red);text-decoration:none;}
    .back-btn{color:var(--muted);text-decoration:none;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;transition:color .2s;}
    .back-btn:hover{color:#fff;}

    /* ── HERO — banner nativo 3002×1116 (ratio ≈ 2.69:1) ── */
    .hero{
      position:relative;
      /* padding-bottom mantiene il ratio esatto del banner */
      padding-bottom:calc(1116 / 3002 * 100%);
      display:flex;align-items:flex-end;
      overflow:hidden;
    }
    /* contenuto testo ancorato in basso a sinistra */
    .hero-content-anchor{
      position:absolute;inset:0;
      display:flex;align-items:flex-end;
      padding:0 52px 56px;
      z-index:3;
    }
    .hero-photo-wrap{position:absolute;inset:0;overflow:hidden;}
    .hero-photo-wrap img{
      width:100%;height:100%;
      object-fit:cover;
      /* mostra l'intera larghezza; centra verticalmente */
      object-position:center center;
      display:block;
      filter:saturate(0.88);
    }
    .hero-photo-wrap::after{content:'';position:absolute;inset:0;
      background:
        linear-gradient(90deg,rgba(10,10,10,0.78) 0%,rgba(10,10,10,0.35) 38%,transparent 65%),
        linear-gradient(to top,rgba(10,10,10,0.95) 0%,rgba(10,10,10,0.25) 22%,transparent 42%),
        linear-gradient(to bottom,rgba(10,10,10,0.35) 0%,transparent 14%);}
    .hero-content{position:relative;z-index:2;max-width:580px;animation:fadeUp .8s cubic-bezier(0.16,1,0.3,1) both;}
    .hero-badge{display:inline-flex;font-size:9px;letter-spacing:0.28em;text-transform:uppercase;color:var(--red);border:1px solid rgba(229,9,20,0.4);padding:5px 14px;margin-bottom:18px;}
    .hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(58px,8vw,92px);letter-spacing:0.04em;line-height:0.9;margin-bottom:14px;}
    .hero h1 span{color:var(--red);}
    .hero-meta{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap;}
    .hero-meta span{font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);}
    .hero-meta .dot{width:3px;height:3px;background:var(--muted);border-radius:50%;}
    .hero-desc{font-size:13.5px;line-height:1.75;color:rgba(255,255,255,0.58);max-width:460px;font-weight:300;margin-bottom:30px;}
    .hero-actions{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .btn-tg{display:inline-flex;align-items:center;gap:10px;padding:13px 26px;background:var(--tg);border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:11.5px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:background .25s,box-shadow .25s,transform .2s;}
    .btn-tg:hover{background:#1a8bbf;box-shadow:0 8px 30px rgba(34,158,217,0.4);transform:translateY(-1px);}
    .btn-tg svg{width:17px;height:17px;fill:#fff;flex-shrink:0;}
    .btn-scroll{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:#fff;font-family:'Outfit',sans-serif;font-size:11.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:background .25s;}
    .btn-scroll:hover{background:rgba(255,255,255,0.15);}

    /* ── SECTION ── */
    .section{padding:44px 44px 90px;}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
    .section-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.08em;}
    .section-count{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);}

    /* ── VIDEO GRID — larger cards ── */
    .video-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
      gap:16px;
    }

    .video-card{
      position:relative;background:var(--card);
      border:1px solid var(--border);
      overflow:hidden;cursor:pointer;
      transition:transform .3s cubic-bezier(0.16,1,0.3,1),box-shadow .3s,border-color .3s;
      animation:fadeUp .55s cubic-bezier(0.16,1,0.3,1) both;
    }
    .video-card:hover{
      transform:translateY(-4px) scale(1.015);
      box-shadow:0 24px 64px rgba(0,0,0,0.8),0 0 0 1px rgba(229,9,20,0.28);
      border-color:rgba(229,9,20,0.35);
      z-index:2;
    }

    /* 16:9 thumbnail — taller than before */
    .thumb{position:relative;padding-bottom:58%;overflow:hidden;background:#0d0d0d;}
    .thumb img{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;object-position:center top;
      display:block;
      transition:transform .5s cubic-bezier(0.16,1,0.3,1),filter .4s;
      filter:brightness(0.92);
    }
    .video-card:hover .thumb img{transform:scale(1.06);filter:brightness(1);}

    /* fallback gradient when no thumbnail */
    .thumb-fallback{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
    }
    .thumb-fallback-num{
      font-family:'Bebas Neue',sans-serif;font-size:80px;
      color:rgba(255,255,255,0.05);
      user-select:none;
    }

    .play-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(0,0,0,0.6) 0%,transparent 50%);
      display:flex;align-items:center;justify-content:center;
      opacity:0;transition:opacity .3s;
    }
    .video-card:hover .play-overlay{opacity:1;}
    .play-circle{
      width:58px;height:58px;
      background:rgba(229,9,20,0.92);
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      backdrop-filter:blur(4px);
      transition:transform .2s;
      box-shadow:0 4px 24px rgba(229,9,20,0.5);
    }
    .video-card:hover .play-circle{transform:scale(1.1);}
    .play-circle::after{
      content:'';
      border-left:18px solid #fff;
      border-top:10px solid transparent;
      border-bottom:10px solid transparent;
      margin-left:4px;
    }

    .duration{
      position:absolute;bottom:10px;right:10px;
      background:rgba(0,0,0,0.85);
      font-size:10.5px;font-weight:600;color:#fff;
      padding:3px 8px;letter-spacing:0.04em;
    }
    .new-badge{
      position:absolute;top:10px;left:10px;
      background:var(--red);font-size:8px;font-weight:700;
      letter-spacing:0.2em;text-transform:uppercase;
      color:#fff;padding:4px 9px;
    }
    .card-body{padding:14px 16px 16px;}
    .card-title{
      font-size:14px;font-weight:500;color:#fff;
      line-height:1.38;margin-bottom:8px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .card-meta{display:flex;align-items:center;gap:10px;}
    .card-tag{
      font-size:9px;letter-spacing:0.14em;text-transform:uppercase;
      color:var(--red);border:1px solid rgba(229,9,20,0.3);padding:2px 8px;
    }
    .card-year{font-size:10.5px;color:var(--muted);}

    /* ── MODAL PLAYER ── */
    .modal-overlay{
      position:fixed;inset:0;z-index:200;
      background:rgba(0,0,0,0.92);
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;
      transition:opacity .3s;
      backdrop-filter:blur(6px);
    }
    .modal-overlay.active{opacity:1;pointer-events:all;}
    .modal-box{
      position:relative;width:min(92vw,1040px);
      animation:scaleIn .35s cubic-bezier(0.16,1,0.3,1) both;
    }
    .modal-close{
      position:absolute;top:-42px;right:0;
      background:none;border:none;color:rgba(255,255,255,0.6);
      font-size:13px;letter-spacing:0.16em;text-transform:uppercase;
      cursor:pointer;padding:6px 10px;transition:color .2s;
      font-family:'Outfit',sans-serif;
    }
    .modal-close:hover{color:#fff;}
    .modal-iframe-wrap{
      position:relative;padding-bottom:56.25%;
      background:#000;
      box-shadow:0 32px 80px rgba(0,0,0,0.9),0 0 0 1px rgba(229,9,20,0.2);
    }
    .modal-iframe-wrap iframe{
      position:absolute;inset:0;width:100%;height:100%;
      border:none;
    }
    .modal-title-bar{
      padding:14px 4px 0;
      display:flex;align-items:flex-start;justify-content:space-between;gap:16px;
    }
    .modal-title{font-size:15px;font-weight:500;color:#fff;line-height:1.4;}
    .modal-meta{font-size:11px;color:var(--muted);white-space:nowrap;margin-top:2px;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.94)}to{opacity:1;transform:scale(1)}}

    @media(max-width:700px){
      .hero-content-anchor{padding:60px 22px 36px;}
      .section{padding:28px 18px 60px;}
      .topbar{padding:0 18px;}
      .video-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
    }
    @media(max-width:480px){
      .video-grid{grid-template-columns:1fr 1fr;gap:10px;}
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     ██ CONFIGURAZIONE BUNNY STREAM
     ═══════════════════════════════════════════════════════════
     1. Sostituisci LIBRARY_ID con l'ID della tua libreria Bunny
     2. Sostituisci CDN_HOSTNAME con il tuo Pull Zone hostname
        es: "vz-abc123.b-cdn.net"
     3. Aggiungi i tuoi video nell'array VIDEOS qui sotto
     ═══════════════════════════════════════════════════════════ -->
<script>
  // ─── IMPOSTAZIONI BUNNY STREAM ────────────────────────────
  const LIBRARY_ID  = "123456";           // ← il tuo Library ID
  const CDN_HOSTNAME = "vz-abc.b-cdn.net"; // ← il tuo Pull Zone hostname

  // ─── I TUOI VIDEO ────────────────────────────────────────
  // Per ogni video aggiungi un oggetto come questi:
  //   id       : Video GUID di Bunny Stream
  //   title    : Titolo del video
  //   duration : Durata (stringa, es "42:18")
  //   year     : Anno (es "2024")
  //   tag      : Etichetta (es "Scene", "BTS", "Interview")
  //   isNew    : true = mostra badge "NEW", false = nessun badge
  const VIDEOS = [
    {
      id:       "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx",
      title:    "Titolo del primo video – Full Scene",
      duration: "38:24",
      year:     "2024",
      tag:      "Scene",
      isNew:    true
    },
    {
      id:       "yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy",
      title:    "Secondo video – Extended Cut",
      duration: "52:10",
      year:     "2024",
      tag:      "Scene",
      isNew:    true
    },
    {
      id:       "zzzzzzzz-zzzz-zzzz-zzzz-zzzzzzzzzzzz",
      title:    "Terzo video",
      duration: "29:45",
      year:     "2023",
      tag:      "Scene",
      isNew:    false
    }
    // ← Aggiungi altri video qui
  ];
  // ─────────────────────────────────────────────────────────
</script>

<div class="topbar">
  <a class="topbar-logo" href="home.html">VAULT</a>
  <a class="back-btn" href="home.html">← Back</a>
</div>

<div class="hero">
  <div class="hero-photo-wrap">
    <img src="corychase_banner.png" alt="Cory Chase" onerror="this.parentElement.style.display='none'"/>
  </div>
  <div class="hero-content-anchor">
    <div class="hero-content">
    <div class="hero-badge">★ Actress Profile</div>
    <h1>Cory<br><span>Chase</span></h1>
    <div class="hero-meta">
      <span>Actress</span><div class="dot"></div>
      <span>Active since 2008</span><div class="dot"></div>
      <span>800+ Titles</span>
    </div>
    <p class="hero-desc">A fan favorite known for her natural charm and incredible on-screen presence. Cory Chase has built a devoted following worldwide with a catalog spanning hundreds of performances.</p>
    <div class="hero-actions">
      <a class="btn-tg" href="https://t.me/c/3201661494/367" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.17 13.667l-2.94-.92c-.64-.203-.658-.64.135-.954l11.57-4.461c.537-.194 1.006.131.959.889z"/></svg>
        Join Telegram
      </a>
      <button class="btn-scroll" onclick="document.getElementById('videos').scrollIntoView({behavior:'smooth'})">▶ Watch Videos</button>
    </div>
    </div><!-- /.hero-content -->
  </div><!-- /.hero-content-anchor -->
</div><!-- /.hero -->

<!-- ── VIDEO SECTION ── -->
<div class="section" id="videos">
  <div class="section-header">
    <div class="section-title">All Videos</div>
    <div class="section-count" id="count">0 videos</div>
  </div>
  <div class="video-grid" id="grid"></div>
</div>

<!-- ── MODAL PLAYER ── -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModalDirect()">✕ Close</button>
    <div class="modal-iframe-wrap">
      <iframe id="modal-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="modal-title-bar">
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-meta" id="modal-meta"></div>
    </div>
  </div>
</div>

<script>
  if(!sessionStorage.getItem('auth')) window.location.href='index.html';

  // ── Funzione per URL thumbnail Bunny Stream ──
  function thumbUrl(videoId) {
    return `https://${CDN_HOSTNAME}/${videoId}/thumbnail.jpg`;
  }

  // ── Funzione per URL embed Bunny Stream ──
  function embedUrl(videoId) {
    return `https://iframe.mediadelivery.net/embed/${LIBRARY_ID}/${videoId}?autoplay=true&responsive=true`;
  }

  // ── Genera le card ──
  const grid = document.getElementById('grid');

  VIDEOS.forEach((v, i) => {
    const delay = (i * 60) + 'ms';
    const card = document.createElement('div');
    card.className = 'video-card';
    card.style.animationDelay = delay;
    card.onclick = () => openModal(v);

    card.innerHTML = `
      <div class="thumb">
        <img
          src="${thumbUrl(v.id)}"
          alt="${v.title}"
          loading="lazy"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
        />
        <div class="thumb-fallback" style="display:none">
          <span class="thumb-fallback-num">${String(i+1).padStart(2,'0')}</span>
        </div>
        <div class="play-overlay"><div class="play-circle"></div></div>
        <div class="duration">${v.duration}</div>
        ${v.isNew ? '<div class="new-badge">NEW</div>' : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${v.title}</div>
        <div class="card-meta">
          <span class="card-tag">${v.tag}</span>
          <span class="card-year">${v.year}</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });

  // ── Contatore ──
  const c = VIDEOS.length;
  document.getElementById('count').textContent = c + ' video' + (c !== 1 ? 's' : '');

  // ── Modal ──
  function openModal(v) {
    document.getElementById('modal-iframe').src = embedUrl(v.id);
    document.getElementById('modal-title').textContent = v.title;
    document.getElementById('modal-meta').textContent = v.duration + ' · ' + v.year;
    document.getElementById('modal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModalDirect() {
    document.getElementById('modal').classList.remove('active');
    document.getElementById('modal-iframe').src = '';
    document.body.style.overflow = '';
  }

  function closeModal(e) {
    if(e.target === document.getElementById('modal')) closeModalDirect();
  }

  document.addEventListener('keydown', e => {
    if(e.key === 'Escape') closeModalDirect();
  });
</script>
</body>
</html>
