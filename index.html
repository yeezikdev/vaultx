<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login · Private Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --red:#e50914;--bg:#0a0a0a;
      --border:rgba(255,255,255,0.08);--text:#fff;--muted:rgba(255,255,255,0.45);
    }
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .bg-glow{position:fixed;inset:0;pointer-events:none;
      background:radial-gradient(ellipse 60% 50% at 50% 100%,rgba(229,9,20,0.13) 0%,transparent 60%);}
    .card{position:relative;width:400px;padding:56px 44px 52px;
      background:rgba(20,20,20,0.97);border:1px solid var(--border);
      box-shadow:0 0 100px rgba(229,9,20,0.08),0 40px 80px rgba(0,0,0,0.6);
      animation:slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,transparent,var(--red),transparent);}
    @keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
    .logo{text-align:center;margin-bottom:40px;}
    .logo-icon{width:56px;height:56px;margin:0 auto 18px;background:var(--red);
      display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;}
    .logo h1{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:0.14em;}
    .logo p{font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
    .field{margin-bottom:18px;}
    label{display:block;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
      color:var(--muted);margin-bottom:8px;}
    input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);
      color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;
      padding:14px 16px;outline:none;transition:border-color .3s,box-shadow .3s;}
    input:focus{border-color:rgba(229,9,20,0.6);box-shadow:0 0 0 3px rgba(229,9,20,0.08);}
    input::placeholder{color:rgba(255,255,255,0.2)}
    .btn{width:100%;margin-top:30px;padding:16px;background:var(--red);border:none;
      color:#fff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:500;
      letter-spacing:0.2em;text-transform:uppercase;cursor:pointer;
      transition:background .3s,box-shadow .3s;}
    .btn:hover{background:#c8070f;box-shadow:0 8px 32px rgba(229,9,20,0.35);}
    .error{margin-top:16px;padding:12px 16px;background:rgba(229,9,20,0.1);
      border:1px solid rgba(229,9,20,0.3);color:#ff7070;font-size:12px;
      text-align:center;display:none;}
    .error.show{display:block;animation:shake .4s ease;}
    @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">▶</div>
    <h1>Private Access</h1>
    <p>Members Only Area</p>
  </div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" autocomplete="off"/>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password"/>
  </div>
  <button class="btn" id="loginBtn">Sign In</button>
  <div class="error" id="errorMsg">Invalid credentials. Please try again.</div>
</div>
<script>
  function doLogin() {
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value.trim();
    var err = document.getElementById('errorMsg');
    if (u === 'bbsyx' && p === 'love22') {
      sessionStorage.setItem('auth', '1');
      window.location.href = 'home.html';
    } else {
      err.classList.remove('show');
      void err.offsetWidth;
      err.classList.add('show');
    }
  }
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
